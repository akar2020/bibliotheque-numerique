server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Optimisations & Sécurité (Vos réglages)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 2. Gestion du Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache statique
    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN"; # Rappel des headers
    }

    # 3. Reverse Proxy (Aligné sur votre docker-compose.yml)
    # Note : On utilise les noms de service 'books-service', 'auth-service', etc.
    
    location /api/auth-service/ {
        proxy_pass http://auth-service:3000/; 
        proxy_set_header Host $host;
    }

    location /api/books-service/ {
        proxy_pass http://books-service:3001/;
        proxy_set_header Host $host;
    }

    location /api/users-service/ {
        proxy_pass http://users-service:3002/;
        proxy_set_header Host $host;
    }

    location /api/loans-service/ {
        proxy_pass http://loans-service:3003/;
        proxy_set_header Host $host;
    }
}